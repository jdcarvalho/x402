kind: fixed
body: EVM facilitator verify now rejects payments whose asset address has no bytecode (EOA). Calling any function on an EOA via eth_call silently returns empty data without reverting, causing on-chain simulation to pass and the subsequent settlement to land as a no-op with no Transfer event emitted. The fix calls eth_getCode on the asset address early in verifyEIP3009, VerifyPermit2, and VerifyUptoPermit2; any address with no bytecode is rejected with asset_not_deployed_contract.
